<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />

<title>Temuan Pilihan</title>

<!-- GOOGLE FONT -->
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700;800&display=swap" rel="stylesheet">

<style>

/* RESET */

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Poppins', sans-serif;
}

/* BODY */

body{

background:
linear-gradient(
180deg,
#fffaf5 0%,
#f7f1eb 100%
);

display:flex;
justify-content:center;
align-items:center;

min-height:100vh;

padding:20px;

overflow-x:hidden;

position:relative;

animation:fadePage .8s ease;
}

/* PAGE FADE */

@keyframes fadePage{

from{
opacity:0;
transform:translateY(10px);
}

to{
opacity:1;
transform:translateY(0);
}

}

/* DECORATIVE BACKGROUND */

.bg-decoration{
position:absolute;
inset:0;
overflow:hidden;
z-index:0;
pointer-events:none;
}

/* ORANGE BLOBS */

.blob{
position:absolute;

background:
linear-gradient(
135deg,
#ff8a00,
#ff5e00
);
}

/* TOP RIGHT */

.blob-top{

width:420px;
height:220px;

top:-40px;
right:-80px;

border-bottom-left-radius:140px;
border-bottom-right-radius:40px;
}

/* BOTTOM LEFT */

.blob-bottom{

width:320px;
height:180px;

bottom:-50px;
left:-60px;

border-top-right-radius:140px;
border-top-left-radius:40px;
}

/* CIRCLES */

.circle{
position:absolute;
border-radius:50%;
border:4px solid rgba(255,140,0,0.20);
}

/* BIG CIRCLE */

.circle-1{

width:260px;
height:260px;

top:-120px;
left:-100px;
}

/* SMALL CIRCLE */

.circle-2{

width:55px;
height:55px;

top:160px;
right:260px;
}

/* DOTS */

.dots{

position:absolute;

width:140px;
height:140px;

background-image:
radial-gradient(
#ff9b4a 2px,
transparent 2px
);

background-size:38px 38px;

opacity:.9;
}

/* DOT POSITION */

.dots-1{
top:40px;
left:20px;
}

.dots-2{
bottom:40px;
right:20px;
}

/* CONTAINER */

.container{

width:100%;
max-width:470px;

text-align:center;

position:relative;
z-index:2;

padding:10px;
}

/* LOGO */

.logo{

width:125px;
height:125px;

margin:0 auto 24px;

border-radius:36px;

background:
linear-gradient(
135deg,
#ff8a00,
#ff5e00
);

display:flex;
align-items:center;
justify-content:center;

font-size:56px;

box-shadow:
0 15px 40px rgba(255,120,0,0.28);

border:
4px solid rgba(255,255,255,0.55);

animation:floating 3s ease-in-out infinite;
}

/* FLOATING */

@keyframes floating{

0%{
transform:translateY(0px);
}

50%{
transform:translateY(-7px);
}

100%{
transform:translateY(0px);
}

}

/* BADGE */

.badge{

display:inline-block;

padding:8px 16px;

border-radius:999px;

font-size:12px;
font-weight:700;

margin-bottom:20px;

background:
rgba(255,102,0,0.10);

color:#ff6600;

border:
1px solid rgba(255,102,0,0.12);

backdrop-filter:blur(10px);
}

/* TITLE */

h1{

font-size:44px;
font-weight:800;

letter-spacing:-1.8px;

margin-bottom:14px;

background:
linear-gradient(
135deg,
#1e1e1e,
#444
);

-webkit-background-clip:text;
-webkit-text-fill-color:transparent;
}

/* SUBTITLE */

.subtitle{

font-size:15px;
line-height:1.8;

color:#666;

padding:0 10px;

margin-bottom:38px;
}

/* BUTTON CARD */

.button{

display:flex;
align-items:center;
justify-content:space-between;

text-decoration:none;

padding:18px 22px;

margin-bottom:16px;

border-radius:26px;

background:
rgba(255,255,255,0.72);

backdrop-filter:blur(18px);

border:
1px solid rgba(255,255,255,0.8);

box-shadow:
0 10px 30px rgba(0,0,0,0.05),
0 2px 10px rgba(255,120,0,0.05);

transition:.35s ease;

position:relative;
overflow:hidden;

color:#222;
}

/* SHINE EFFECT */

.button::before{

content:"";

position:absolute;

top:0;
left:-120%;

width:100%;
height:100%;

background:
linear-gradient(
90deg,
transparent,
rgba(255,255,255,0.45),
transparent
);

transition:.8s;
}

.button:hover::before{
left:120%;
}

/* HOVER */

.button:hover{

transform:
translateY(-5px)
scale(1.01);

box-shadow:
0 20px 40px rgba(0,0,0,0.10);
}

/* LEFT SIDE */

.left{

display:flex;
align-items:center;
gap:16px;
}

/* ICON */

.icon{

width:54px;
height:54px;

border-radius:18px;

display:flex;
align-items:center;
justify-content:center;

font-size:25px;

color:white;

flex-shrink:0;
}

/* ARROW */

.arrow{
font-size:24px;
opacity:.45;
}

/* CATEGORY COLORS */

.viral .icon{
background:
linear-gradient(
135deg,
#ff8a00,
#ff5e00
);
}

.gadget .icon{
background:
linear-gradient(
135deg,
#3b82f6,
#2563eb
);
}

.home .icon{
background:
linear-gradient(
135deg,
#10b981,
#059669
);
}

.dapur .icon{
background:
linear-gradient(
135deg,
#f59e0b,
#d97706
);
}

.muslim .icon{
background:
linear-gradient(
135deg,
#22c55e,
#15803d
);
}

/* BUTTON TEXT */

.button span{

font-size:18px;
font-weight:700;
}

/* FOOTER */

.footer{

margin-top:20px;

font-size:12px;

color:#999;

opacity:.75;
}

/* RESPONSIVE */

@media(max-width:480px){

.logo{
width:110px;
height:110px;
font-size:48px;
}

h1{
font-size:36px;
}

.subtitle{
font-size:14px;
line-height:1.7;
}

.button{
padding:16px 18px;
}

.button span{
font-size:16px;
}

.icon{
width:48px;
height:48px;
font-size:22px;
}

}

</style>
</head>

<body>

<!-- DECORATIVE BACKGROUND -->

<div class="bg-decoration">

<div class="blob blob-top"></div>

<div class="blob blob-bottom"></div>

<div class="circle circle-1"></div>

<div class="circle circle-2"></div>

<div class="dots dots-1"></div>

<div class="dots dots-2"></div>

</div>

<!-- MAIN CONTAINER -->

<div class="container">

<!-- LOGO -->

<div class="logo">
🔎
</div>

<!-- BADGE -->

<div class="badge">
✨ Rekomendasi Produk Terbaik
</div>

<!-- TITLE -->

<h1>
Temuan Pilihan
</h1>

<!-- SUBTITLE -->

<p class="subtitle">
Temukan produk viral, gadget modern, hingga kebutuhan rumah tangga pilihan dengan tampilan premium dan harga terbaik.
</p>

<!-- BUTTON 1 -->

<a class="button viral" href="produk-viral.html">

<div class="left">

<div class="icon">
🔥
</div>

<span>
Produk Viral
</span>

</div>

<div class="arrow">
›
</div>

</a>

<!-- BUTTON 2 -->

<a class="button gadget" href="gadget-pilihan.html">

<div class="left">

<div class="icon">
📱
</div>

<span>
Gadget Pilihan
</span>

</div>

<div class="arrow">
›
</div>

</a>

<!-- BUTTON 3 -->

<a class="button home" href="#">

<div class="left">

<div class="icon">
🏠
</div>

<span>
Home Living
</span>

</div>

<div class="arrow">
›
</div>

</a>

<!-- BUTTON 4 -->

<a class="button dapur" href="#">

<div class="left">

<div class="icon">
🍳
</div>

<span>
Peralatan Dapur
</span>

</div>

<div class="arrow">
›
</div>

</a>

<!-- BUTTON 5 -->

<a class="button muslim" href="#">

<div class="left">

<div class="icon">
🕌
</div>

<span>
Produk Muslim
</span>

</div>

<div class="arrow">
›
</div>

</a>

<!-- FOOTER -->

<div class="footer">
Temuan Pilihan © 2026
</div>

</div>

<!-- PAGE TRANSITION -->

<script>

document.querySelectorAll("a").forEach(link => {

link.addEventListener("click", function(e){

const href = this.getAttribute("href");

if(href && href !== "#"){

e.preventDefault();

document.body.style.opacity = "0";

document.body.style.transform = "translateY(10px)";

document.body.style.transition = ".35s ease";

setTimeout(() => {

window.location.href = href;

}, 350);

}

});

});

</script>

</body>
</html>
