<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Temuan Pilihan</title>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700;800&display=swap" rel="stylesheet">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Poppins',sans-serif;
}

body{
min-height:100vh;
padding:20px;
overflow-x:hidden;
position:relative;
animation:fadePage .5s ease;
}

/* BACKGROUND FIXED */

.fixed-bg{
position:fixed;
inset:0;
z-index:-20;

background:
linear-gradient(
180deg,
#fdfbf8 0%,
#f4efe8 100%
);
}

.bg-decoration{
position:fixed;
inset:0;
z-index:-10;
pointer-events:none;
overflow:hidden;
}

/* BLOBS */

.blob{
position:absolute;

background:
linear-gradient(
135deg,
#ff8a00,
#ff5e00
);
}

.blob-top{
width:320px;
height:180px;
top:-20px;
right:-70px;
border-bottom-left-radius:120px;
}

.blob-bottom{
width:360px;
height:220px;
bottom:-80px;
left:-80px;
border-top-right-radius:160px;
}

/* CIRCLES */

.circle{
position:absolute;
border-radius:50%;
border:4px solid rgba(255,140,0,.15);
}

.circle-1{
width:280px;
height:280px;
top:-120px;
left:-120px;
}

.circle-2{
width:60px;
height:60px;
top:180px;
right:250px;
}

/* DOTS */

.dots{
position:absolute;

width:140px;
height:140px;

background-image:
radial-gradient(
#ff9b4a 2px,
transparent 2px
);

background-size:35px 35px;
opacity:.45;
}

.dots-1{
top:40px;
left:20px;
}

.dots-2{
bottom:40px;
right:20px;
}

/* PAGE */

.container{
width:100%;
max-width:480px;
margin:auto;
text-align:center;
position:relative;
z-index:5;
}

/* LOGO */

.logo{
width:140px;
height:140px;
margin:30px auto 20px;
border-radius:50%;
overflow:hidden;

background:
rgba(255,255,255,.45);

backdrop-filter:blur(20px);

border:
4px solid rgba(255,255,255,.7);

box-shadow:
0 15px 40px rgba(255,120,0,.2);

animation:floating 3s ease-in-out infinite;
}

.logo img{
width:100%;
height:100%;
object-fit:cover;
}

@keyframes floating{
0%{transform:translateY(0);}
50%{transform:translateY(-8px);}
100%{transform:translateY(0);}
}

/* BADGE */

.badge{
display:inline-block;
padding:8px 15px;
border-radius:999px;
font-size:12px;
font-weight:700;
margin-bottom:16px;

background:
rgba(255,255,255,.4);

backdrop-filter:blur(10px);

border:
1px solid rgba(255,255,255,.7);
}

/* TITLE */

h1{
font-size:42px;
font-weight:800;
margin-bottom:12px;

background:
linear-gradient(
135deg,
#222,
#555
);

-webkit-background-clip:text;
-webkit-text-fill-color:transparent;
}

.subtitle{
font-size:15px;
line-height:1.8;
color:#666;
margin-bottom:28px;
}

/* SEARCH */

.search-box{
width:100%;
padding:16px 18px;
border:none;
outline:none;
border-radius:22px;
font-size:15px;
margin-bottom:18px;

background:
rgba(255,255,255,.55);

backdrop-filter:blur(18px);

box-shadow:
0 8px 25px rgba(0,0,0,.05);
}

/* BUTTON */

.button{
display:flex;
align-items:center;
justify-content:space-between;
padding:16px 18px;
margin-bottom:12px;
text-decoration:none;
border-radius:24px;
color:#222;

background:
rgba(255,255,255,.4);

backdrop-filter:blur(20px);

border:
1px solid rgba(255,255,255,.8);

box-shadow:
0 8px 20px rgba(0,0,0,.05);

transition:.25s;
}

.button:hover{
transform:translateY(-3px);

box-shadow:
0 15px 35px rgba(0,0,0,.08);
}

.button span{
font-size:16px;
font-weight:700;
}

.arrow{
font-size:22px;
opacity:.5;
}

.footer{
margin-top:20px;
font-size:12px;
color:#888;
}

#searchResults{
margin-bottom:18px;
}

.search-result{
display:block;
text-align:left;
padding:14px 18px;
margin-bottom:8px;
border-radius:18px;
text-decoration:none;
color:#222;

background:
rgba(255,255,255,.5);

backdrop-filter:blur(15px);

box-shadow:
0 6px 15px rgba(0,0,0,.05);

transition:.2s;
}

.search-result:hover{
transform:translateY(-2px);

box-shadow:
0 10px 20px rgba(0,0,0,.08);
}

@keyframes fadePage{
from{
opacity:0;
transform:translateY(10px);
}
to{
opacity:1;
transform:translateY(0);
}
}

@media(max-width:480px){

.logo{
width:110px;
height:110px;
}

h1{
font-size:34px;
}

.subtitle{
font-size:14px;
}

}

</style>

</head>

<body>

<div class="fixed-bg"></div>

<div class="bg-decoration">

<div class="blob blob-top"></div>
<div class="blob blob-bottom"></div>

<div class="circle circle-1"></div>
<div class="circle circle-2"></div>

<div class="dots dots-1"></div>
<div class="dots dots-2"></div>

</div>

<div class="container">

<div class="logo">
<img src="logo.png" alt="Temuan Pilihan">
</div>

<div class="badge">
✨ Kurasi Produk Pilihan
</div>

<h1>Temuan Pilihan</h1>

<p class="subtitle">
Cari nomor atau nama produk yang disebut di video.
</p>

<input
type="text"
id="searchInput"
class="search-box"
placeholder="Cari nomor atau nama produk...">

<div id="searchResults"></div>

<div id="categoryContainer"></div>

<div class="footer">
© Temuan Pilihan
</div>

</div>

<script src="products.js"></script>

<script>

window.addEventListener("pageshow",()=>{
document.body.style.opacity="1";
});

function navigateWithFade(url){

document.body.style.opacity="0";

setTimeout(()=>{
window.location.href=url;
},120);

}

/* KATEGORI OTOMATIS */

const categoryContainer =
document.getElementById("categoryContainer");

const totalProducts =
PRODUCTS.length;

const totalPages =
Math.ceil(totalProducts / 100);

for(let i=0;i<totalPages;i++){

const start=(i*100)+1;
const end=(i+1)*100;

const button=document.createElement("a");

button.className="button";

button.href=`produk.html?range=${start}-${end}`;

button.innerHTML=`
<span>📦 Produk ${start} - ${end}</span>
<div class="arrow">›</div>
`;

button.addEventListener("click",(e)=>{
e.preventDefault();
navigateWithFade(button.href);
});

categoryContainer.appendChild(button);

}

/* SEARCH */

const searchInput =
document.getElementById("searchInput");

const searchResults =
document.getElementById("searchResults");

searchInput.addEventListener("input",()=>{

const keyword=
searchInput.value.trim().toLowerCase();

searchResults.innerHTML="";

if(!keyword) return;

const results=
PRODUCTS.filter(product=>

product.number.includes(keyword) ||

product.name
.toLowerCase()
.includes(keyword)

).slice(0,10);

results.forEach(product=>{

const number=
parseInt(product.number);

const start=
Math.floor((number-1)/100)*100+1;

const end=
start+99;

const link=
document.createElement("a");

link.className="search-result";

link.href=
`produk.html?range=${start}-${end}&produk=${product.number}`;

link.textContent=
`${product.number} • ${product.name}`;

link.addEventListener("click",(e)=>{

e.preventDefault();

navigateWithFade(link.href);

});

searchResults.appendChild(link);

});

});

</script>

</body>
</html>
