<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />

<title>Temuan Pilihan</title>

<!-- FONT PREMIUM -->
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700;800&display=swap" rel="stylesheet">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Poppins', sans-serif;
}

body{

background:
radial-gradient(circle at top right, rgba(255,136,0,0.18), transparent 25%),
radial-gradient(circle at bottom left, rgba(255,190,90,0.12), transparent 25%),
linear-gradient(180deg,#fffaf5 0%,#f6f1eb 100%);

display:flex;
justify-content:center;
align-items:center;
min-height:100vh;

padding:20px;
overflow-x:hidden;
position:relative;
}

/* BACKGROUND GLOW */

body::before{
content:"";
position:absolute;

top:-120px;
right:-120px;

width:320px;
height:320px;

background:
linear-gradient(
135deg,
#ff8a00,
#ff5e00
);

opacity:.12;
filter:blur(90px);

border-radius:50%;
z-index:0;
}

body::after{
content:"";
position:absolute;

bottom:-100px;
left:-100px;

width:260px;
height:260px;

background:
linear-gradient(
135deg,
#ffd89b,
#ffb347
);

opacity:.10;
filter:blur(90px);

border-radius:50%;
z-index:0;
}

/* CONTAINER */

.container{
width:100%;
max-width:470px;

text-align:center;

position:relative;
z-index:2;

padding:10px;
}

/* LOGO */

.logo{
width:120px;
height:120px;

border-radius:34px;

background:
linear-gradient(
135deg,
#ff8a00,
#ff5e00
);

display:flex;
align-items:center;
justify-content:center;

font-size:52px;

margin:0 auto 24px;

box-shadow:
0 10px 30px rgba(255,120,0,0.25);

border:4px solid rgba(255,255,255,0.5);

animation:float 3s ease-in-out infinite;
}

/* FLOATING ANIMATION */

@keyframes float{

0%{
transform:translateY(0px);
}

50%{
transform:translateY(-6px);
}

100%{
transform:translateY(0px);
}

}

/* BADGE */

.badge{

display:inline-block;

background:
rgba(255,102,0,0.10);

color:#ff6600;

padding:8px 15px;

border-radius:999px;

font-size:12px;
font-weight:700;

margin-bottom:20px;

border:
1px solid rgba(255,102,0,0.12);

}

/* TITLE */

h1{

font-size:42px;
font-weight:800;

letter-spacing:-1.5px;

background:
linear-gradient(
135deg,
#1e1e1e,
#444
);

-webkit-background-clip:text;
-webkit-text-fill-color:transparent;

margin-bottom:14px;
}

/* SUBTITLE */

.subtitle{

color:#666;

font-size:15px;
line-height:1.7;

margin-bottom:36px;

padding:0 12px;
}

/* BUTTON CARD */

.button{

display:flex;
align-items:center;
justify-content:space-between;

text-decoration:none;

background:
rgba(255,255,255,0.72);

backdrop-filter:blur(18px);

color:#222;

padding:18px 22px;
margin-bottom:16px;

border-radius:24px;

font-weight:700;
font-size:17px;

border:
1px solid rgba(255,255,255,0.8);

box-shadow:
0 10px 30px rgba(0,0,0,0.05),
0 2px 10px rgba(255,120,0,0.05);

transition:.3s ease;

position:relative;
overflow:hidden;
}

/* SHINE EFFECT */

.button::before{

content:"";

position:absolute;
top:0;
left:-120%;

width:100%;
height:100%;

background:
linear-gradient(
90deg,
transparent,
rgba(255,255,255,0.45),
transparent
);

transition:.7s;
}

.button:hover::before{
left:120%;
}

/* HOVER */

.button:hover{

transform:translateY(-5px);

box-shadow:
0 18px 35px rgba(0,0,0,0.10);
}

/* BUTTON LEFT */

.left{
display:flex;
align-items:center;
gap:16px;
}

/* ICON */

.icon{

width:52px;
height:52px;

border-radius:18px;

display:flex;
align-items:center;
justify-content:center;

font-size:24px;
color:white;

flex-shrink:0;
}

/* ARROW */

.arrow{
font-size:22px;
opacity:.45;
}

/* CATEGORY COLORS */

.viral .icon{
background:
linear-gradient(
135deg,
#ff8a00,
#ff5e00
);
}

.gadget .icon{
background:
linear-gradient(
135deg,
#3b82f6,
#2563eb
);
}

.home .icon{
background:
linear-gradient(
135deg,
#10b981,
#059669
);
}

.dapur .icon{
background:
linear-gradient(
135deg,
#f59e0b,
#d97706
);
}

.muslim .icon{
background:
linear-gradient(
135deg,
#22c55e,
#15803d
);
}

/* FOOTER */

.footer{

margin-top:20px;

font-size:12px;

color:#999;

opacity:.8;

padding-bottom:4px;
}

/* RESPONSIVE */

@media(max-width:480px){

.logo{
width:105px;
height:105px;
font-size:46px;
}

h1{
font-size:34px;
}

.button{
padding:16px 18px;
font-size:16px;
}

.icon{
width:48px;
height:48px;
font-size:22px;
}

.subtitle{
font-size:14px;
}

}

</style>
</head>

<body>

</div>

</body>
</html>
