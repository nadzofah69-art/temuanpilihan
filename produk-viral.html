<!DOCTYPE html>

<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>🔥 Produk Viral | Temuan Pilihan</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Segoe UI',sans-serif;
}

body{
background:#fdf6ee;
min-height:100vh;
overflow-x:hidden;
padding:20px;
position:relative;
animation:pageIn .8s ease;
}

@keyframes pageIn{
from{
opacity:0;
transform:translateY(15px);
}
to{
opacity:1;
transform:translateY(0);
}
}

/* BACKGROUND */

.top-blob{
position:fixed;
top:-120px;
right:-120px;

width:520px;
height:300px;

background:#ff6b00;

border-bottom-left-radius:180px;

z-index:-3;
}

.bottom-blob{
position:fixed;
bottom:-80px;
left:-80px;

width:260px;
height:180px;

background:#ff7a00;

border-top-right-radius:140px;

z-index:-3;
}

.big-circle{
position:fixed;

width:500px;
height:500px;

top:-250px;
left:-250px;

border:4px solid rgba(255,122,0,.18);

border-radius:50%;

z-index:-2;
}

.small-circle{
position:fixed;

width:60px;
height:60px;

top:140px;
right:220px;

border:4px solid rgba(255,122,0,.25);

border-radius:50%;

z-index:-2;
}

.dots{
position:fixed;

width:150px;
height:150px;

background-image:
radial-gradient(
#ff8a2a 3px,
transparent 3px
);

background-size:38px 38px;

opacity:.75;

z-index:-2;
}

.dots-top{
top:25px;
left:25px;
}

.dots-bottom{
bottom:30px;
right:30px;
}

/* CONTAINER */

.container{
max-width:520px;
margin:auto;
}

/* BACK BUTTON */

.back{

display:inline-block;

margin-bottom:16px;

padding:10px 14px;

background:white;

border-radius:12px;

text-decoration:none;

font-weight:700;

color:#ff6b00;

border:none;

cursor:pointer;

box-shadow:
0 4px 10px rgba(0,0,0,.05);
}

/* HERO */

.hero{

background:rgba(255,255,255,.9);

padding:20px;

border-radius:20px;

text-align:center;

margin-bottom:16px;

box-shadow:
0 10px 25px rgba(0,0,0,.08);
}

.brand{
font-size:13px;
font-weight:700;
color:#ff6b00;
margin-bottom:8px;
letter-spacing:.5px;
}

.hero h1{
font-size:24px;
margin-bottom:6px;
color:#222;
}

.hero p{
font-size:14px;
color:#666;
line-height:1.6;
}

.product-count{

display:inline-block;

margin-top:12px;

padding:6px 12px;

background:#fff3eb;

color:#ff6b00;

font-size:12px;
font-weight:700;

border-radius:999px;
}

/* SEARCH */

.search-box{

width:100%;

padding:14px 16px;

border:none;

border-radius:14px;

margin-bottom:16px;

font-size:14px;

outline:none;

box-shadow:
0 4px 12px rgba(0,0,0,.06);
}

/* PRODUCT CARD */

.product{

display:flex;
align-items:center;

gap:14px;

background:white;

padding:14px 16px;

margin-bottom:10px;

border-radius:16px;

text-decoration:none;

color:#222;

transition:.25s;

box-shadow:
0 4px 12px rgba(0,0,0,.06);
}

.product:hover{
transform:translateY(-2px);

box-shadow:
0 10px 20px rgba(0,0,0,.12);
}

.no{

width:40px;
height:40px;

display:flex;
align-items:center;
justify-content:center;

background:
linear-gradient(
135deg,
#ff6b00,
#ff9a1f
);

color:white;

font-size:14px;
font-weight:700;

border-radius:12px;
}

.name{
flex:1;
font-size:14px;
font-weight:600;
}

.arrow{
font-size:20px;
font-weight:bold;
color:#ff6b00;
}

/* FOOTER */

.footer{
text-align:center;
margin-top:20px;
font-size:12px;
color:#777;
}

</style>

</head>

<body>

<div class="top-blob"></div>
<div class="bottom-blob"></div>

<div class="big-circle"></div>
<div class="small-circle"></div>

<div class="dots dots-top"></div>
<div class="dots dots-bottom"></div>

<div class="container">

<button onclick="goBack()" class="back">
← Kembali
</button>

<div class="hero">

<div class="brand">
🔍 Temuan Pilihan
</div>

<h1>🔥 Produk Viral</h1>

<p>
Temukan produk viral pilihan<br>
yang sedang ramai dicari
</p>

<div class="product-count">
5 Produk Tersedia
</div>

</div>

<input
type="text"
id="searchInput"
placeholder="🔍 Cari nomor atau nama produk..."
class="search-box">

<a href="https://shopee.co.id/" target="_blank" class="product product-item">
<div class="no">01</div>
<div class="name">Lampu Tidur Estetik</div>
<div class="arrow">›</div>
</a>

<a href="https://shopee.co.id/" target="_blank" class="product product-item">
<div class="no">02</div>
<div class="name">Tumbler Premium</div>
<div class="arrow">›</div>
</a>

<a href="https://shopee.co.id/" target="_blank" class="product product-item">
<div class="no">03</div>
<div class="name">Rak Serbaguna Viral</div>
<div class="arrow">›</div>
</a>

<a href="https://shopee.co.id/" target="_blank" class="product product-item">
<div class="no">04</div>
<div class="name">Pengharum Mobil</div>
<div class="arrow">›</div>
</a>

<a href="https://shopee.co.id/" target="_blank" class="product product-item">
<div class="no">05</div>
<div class="name">Organizer Multifungsi</div>
<div class="arrow">›</div>
</a>

<div class="footer">
Temuan Pilihan © 2026
</div>

</div>

<script>

function goBack(){

if(document.referrer !== ""){

history.back();

}else{

window.location.href = "index.html";

}

}

const searchInput =
document.getElementById("searchInput");

searchInput.addEventListener("keyup", function(){

let keyword =
this.value.toLowerCase();

let products =
document.querySelectorAll(".product-item");

products.forEach(function(product){

let text =
product.innerText.toLowerCase();

if(text.includes(keyword)){
product.style.display = "flex";
}else{
product.style.display = "none";
}

});

});

</script>

</body>
</html>
