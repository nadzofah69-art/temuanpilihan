<!DOCTYPE html>

<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>🔥 Produk Viral</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Segoe UI',sans-serif;
}

body{
background:#fdf6ee;
min-height:100vh;
overflow-x:hidden;
padding:20px;
position:relative;
animation:pageIn .8s ease;
}

@keyframes pageIn{
from{
opacity:0;
transform:translateY(15px);
}
to{
opacity:1;
transform:translateY(0);
}
}

/* ===== BACKGROUND ORNAMEN ===== */

.top-blob{
position:fixed;
top:-120px;
right:-120px;

width:520px;
height:300px;

background:#ff6b00;

border-bottom-left-radius:180px;

z-index:-3;
}

.bottom-blob{
position:fixed;
bottom:-80px;
left:-80px;

width:260px;
height:180px;

background:#ff7a00;

border-top-right-radius:140px;

z-index:-3;
}

.big-circle{
position:fixed;

width:500px;
height:500px;

top:-250px;
left:-250px;

border:4px solid rgba(255,122,0,.18);

border-radius:50%;

z-index:-2;
}

.small-circle{
position:fixed;

width:60px;
height:60px;

top:140px;
right:220px;

border:4px solid rgba(255,122,0,.25);

border-radius:50%;

z-index:-2;
}

.dots{
position:fixed;
width:150px;
height:150px;

background-image:
radial-gradient(
#ff8a2a 3px,
transparent 3px
);

background-size:38px 38px;

opacity:.75;

z-index:-2;
}

.dots-top{
top:25px;
left:25px;
}

.dots-bottom{
bottom:30px;
right:30px;
}

/* ===== CONTAINER ===== */

.container{
max-width:520px;
margin:auto;
}

/* ===== BACK ===== */

.back{
display:inline-block;
margin-bottom:16px;

text-decoration:none;

font-weight:700;

color:#ff6b00;
}

/* ===== HERO ===== */

.hero{

background:rgba(255,255,255,.88);

padding:18px;

border-radius:20px;

text-align:center;

margin-bottom:18px;

box-shadow:
0 10px 25px rgba(0,0,0,.08);
}

.hero h1{
font-size:24px;
margin-bottom:6px;
color:#222;
}

.hero p{
font-size:14px;
color:#666;
}

/* ===== PRODUK ===== */

.product{

display:flex;
align-items:center;

gap:14px;

background:white;

padding:14px 16px;

margin-bottom:10px;

border-radius:16px;

text-decoration:none;

color:#222;

transition:.25s;

box-shadow:
0 4px 12px rgba(0,0,0,.06);
}

.product:hover{
transform:translateY(-2px);

box-shadow:
0 10px 20px rgba(0,0,0,.12);
}

.no{

width:38px;
height:38px;

display:flex;
align-items:center;
justify-content:center;

background:#ff6b00;

color:white;

font-size:14px;
font-weight:700;

border-radius:10px;
}

.name{
flex:1;

font-size:14px;

font-weight:600;
}

.arrow{
font-size:20px;
font-weight:bold;

color:#ff6b00;
}

.footer{
text-align:center;

margin-top:20px;

font-size:12px;

color:#777;
}

</style>

</head>

<body>

<div class="top-blob"></div>
<div class="bottom-blob"></div>

<div class="big-circle"></div>
<div class="small-circle"></div>

<div class="dots dots-top"></div>
<div class="dots dots-bottom"></div>

<div class="container">

<a href="index.html" class="back">
← Kembali
</a>

<div class="hero">
<h1>🔥 Produk Viral</h1>
<p>Temuan Viral Pilihan Terbaik</p>
</div>

<a href="https://shopee.co.id/" target="_blank" class="product">
<div class="no">01</div>
<div class="name">Lampu Tidur Estetik</div>
<div class="arrow">›</div>
</a>

<a href="https://shopee.co.id/" target="_blank" class="product">
<div class="no">02</div>
<div class="name">Tumbler Premium</div>
<div class="arrow">›</div>
</a>

<a href="https://shopee.co.id/" target="_blank" class="product">
<div class="no">03</div>
<div class="name">Rak Serbaguna Viral</div>
<div class="arrow">›</div>
</a>

<a href="https://shopee.co.id/" target="_blank" class="product">
<div class="no">04</div>
<div class="name">Pengharum Mobil</div>
<div class="arrow">›</div>
</a>

<a href="https://shopee.co.id/" target="_blank" class="product">
<div class="no">05</div>
<div class="name">Organizer Multifungsi</div>
<div class="arrow">›</div>
</a>

<div class="footer">
Temuan Pilihan © 2026
</div>

</div>

</body>
</html>
