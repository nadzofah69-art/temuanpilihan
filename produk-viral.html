<!DOCTYPE html>

<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>🔥 Produk Viral</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial, sans-serif;
}

body{
background:#f8f5f0;
min-height:100vh;
padding:20px;
overflow-x:hidden;
animation:fadeIn 1s ease;
}

/* ORNAMEN BACKGROUND */

.bg1{
position:fixed;
width:300px;
height:300px;
background:#ff6b00;
border-radius:50%;
top:-100px;
right:-100px;
filter:blur(90px);
opacity:.25;
z-index:-1;
}

.bg2{
position:fixed;
width:250px;
height:250px;
background:#ffb347;
border-radius:50%;
bottom:-80px;
left:-80px;
filter:blur(90px);
opacity:.25;
z-index:-1;
}

.bg3{
position:fixed;
width:180px;
height:180px;
background:#ff8c42;
border-radius:50%;
top:45%;
right:-50px;
filter:blur(80px);
opacity:.15;
z-index:-1;
}

/* ANIMASI */

@keyframes fadeIn{
from{
opacity:0;
transform:translateY(20px);
}
to{
opacity:1;
transform:translateY(0);
}
}

.container{
max-width:500px;
margin:auto;
}

/* TOMBOL KEMBALI */

.back-btn{
display:inline-block;
margin-bottom:20px;
text-decoration:none;
font-weight:bold;
color:#ff6b00;
}

/* HEADER */

.header{
background:white;
padding:28px;
border-radius:24px;
text-align:center;
margin-bottom:20px;

box-shadow:
0 10px 30px rgba(0,0,0,.08);
}

.header h1{
font-size:32px;
margin-bottom:8px;
color:#222;
}

.header p{
color:#666;
line-height:1.5;
}

/* PRODUK */

.product-card{

display:flex;
justify-content:space-between;
align-items:center;

background:white;

padding:18px 20px;

margin-bottom:12px;

border-radius:18px;

text-decoration:none;

color:#222;

font-weight:600;

box-shadow:
0 6px 18px rgba(0,0,0,.06);

transition:.25s;
}

.product-card:hover{

transform:
translateY(-3px);

box-shadow:
0 12px 24px rgba(0,0,0,.10);
}

.product-number{
color:#ff6b00;
font-weight:700;
}

.arrow{
font-size:20px;
color:#ff6b00;
}

/* FOOTER */

.footer{
text-align:center;
margin-top:25px;
font-size:13px;
color:#777;
}

</style>

</head>

<body>
