<!DOCTYPE html>

<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>🔥 Produk Viral</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Segoe UI',sans-serif;
}

body{
background:#f7f5f1;
min-height:100vh;
overflow-x:hidden;
padding:20px;
animation:pageIn .9s ease;
}

/* ANIMASI MASUK */

@keyframes pageIn{
from{
opacity:0;
transform:scale(.97);
}
to{
opacity:1;
transform:scale(1);
}
}

/* GLOW BACKGROUND */

.glow1{
position:fixed;
width:350px;
height:350px;
background:#ff6b00;
top:-120px;
right:-120px;
border-radius:50%;
filter:blur(100px);
opacity:.25;
z-index:-1;
}

.glow2{
position:fixed;
width:300px;
height:300px;
background:#ffd166;
bottom:-100px;
left:-100px;
border-radius:50%;
filter:blur(100px);
opacity:.25;
z-index:-1;
}

/* POLA TITIK */

.pattern{
position:fixed;
inset:0;
z-index:-2;
opacity:.04;

background-image:
radial-gradient(#000 1px, transparent 1px);

background-size:20px 20px;
}

.container{
max-width:520px;
margin:auto;
}

/* KEMBALI */

.back{
display:inline-block;
margin-bottom:20px;
text-decoration:none;
font-weight:700;
color:#ff6b00;
}

/* HEADER */

.hero{

background:rgba(255,255,255,.75);

backdrop-filter:blur(18px);

padding:20px;

border-radius:28px;

margin-bottom:24px;

text-align:center;

box-shadow:
0 10px 35px rgba(0,0,0,.08);
}

.hero h1{
font-size:24px;
margin-bottom:10px;
color:#222;
}

.hero p{
font-size:14px;
color:#666;
line-height:1.7;
}

/* CARD PRODUK */

.product{

display:flex;
align-items:center;

gap:18px;

background:rgba(255,255,255,.85);

backdrop-filter:blur(15px);

padding:14px 18px;

margin-bottom:10px;

border-radius:22px;

text-decoration:none;

color:#222;

transition:.25s;

box-shadow:
0 6px 20px rgba(0,0,0,.06);
}

.product:hover{

transform:
translateY(-4px);

box-shadow:
0 12px 30px rgba(0,0,0,.12);
}

.no{

min-width:38px;
height:38px;

display:flex;
align-items:center;
justify-content:center;

background:#ff6b00;

color:white;

font-weight:700;
font-size:14px;

border-radius:14px;
}

.name{
flex:1;
font-size:14px;
font-weight:600;
}

.arrow{
color:#ff6b00;
font-size:22px;
font-weight:bold;
}

.footer{
text-align:center;
margin-top:25px;
color:#777;
font-size:13px;
}

</style>

</head>

<body>

<div class="pattern"></div>

<div class="glow1"></div>
<div class="glow2"></div>

<div class="container">

<a href="index.html" class="back">
← Kembali
</a>

<div class="hero">

<h1>🔥 Produk Viral</h1>

<p>
Klik nomor produk yang disebut di video,
lalu langsung menuju Shopee.
</p>

</div>

<a href="https://shopee.co.id/" target="_blank" class="product">
<div class="no">01</div>
<div class="name">Lampu Tidur Estetik</div>
<div class="arrow">›</div>
</a>

<a href="https://shopee.co.id/" target="_blank" class="product">
<div class="no">02</div>
<div class="name">Tumbler Premium</div>
<div class="arrow">›</div>
</a>

<a href="https://shopee.co.id/" target="_blank" class="product">
<div class="no">03</div>
<div class="name">Rak Serbaguna Viral</div>
<div class="arrow">›</div>
</a>

<a href="https://shopee.co.id/" target="_blank" class="product">
<div class="no">04</div>
<div class="name">Pengharum Mobil</div>
<div class="arrow">›</div>
</a>

<a href="https://shopee.co.id/" target="_blank" class="product">
<div class="no">05</div>
<div class="name">Organizer Multifungsi</div>
<div class="arrow">›</div>
</a>

<div class="footer">
Temuan Pilihan © 2026
</div>

</div>

</body>
</html>
