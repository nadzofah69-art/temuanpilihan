<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Produk | Temuan Pilihan</title>

<link rel="icon" type="image/png" href="favicon.png">

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700;800&display=swap" rel="stylesheet">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Poppins',sans-serif;
}

/* BODY */

body{
background:#fdf6ee;
min-height:100vh;
overflow-x:hidden;
padding:20px;
position:relative;
animation:pageIn .6s ease;
}

@keyframes pageIn{
from{
opacity:0;
transform:translateY(15px);
}
to{
opacity:1;
transform:translateY(0);
}
}

/* BACKGROUND */

.top-blob{
position:fixed;
top:-120px;
right:-120px;

width:520px;
height:300px;

background:#ff6b00;

border-bottom-left-radius:180px;

z-index:-3;
}

.bottom-blob{
position:fixed;
bottom:-80px;
left:-80px;

width:260px;
height:180px;

background:#ff7a00;

border-top-right-radius:140px;

z-index:-3;
}

.big-circle{
position:fixed;

width:500px;
height:500px;

top:-250px;
left:-250px;

border:4px solid rgba(255,122,0,.18);

border-radius:50%;

z-index:-2;
}

.small-circle{
position:fixed;

width:60px;
height:60px;

top:140px;
right:220px;

border:4px solid rgba(255,122,0,.25);

border-radius:50%;

z-index:-2;
}

.dots{
position:fixed;

width:150px;
height:150px;

background-image:
radial-gradient(
#ff8a2a 3px,
transparent 3px
);

background-size:38px 38px;

opacity:.75;

z-index:-2;
}

.dots-top{
top:25px;
left:25px;
}

.dots-bottom{
bottom:30px;
right:30px;
}

/* CONTAINER */

.container{
max-width:550px;
margin:auto;
}

/* BACK BUTTON */

.back{
display:inline-block;

margin-bottom:16px;

padding:10px 14px;

background:white;

border-radius:12px;

text-decoration:none;

font-weight:700;

color:#ff6b00;

box-shadow:
0 4px 10px rgba(0,0,0,.05);
}

/* HERO */

.hero{

background:rgba(255,255,255,.92);

padding:22px;

border-radius:22px;

text-align:center;

margin-bottom:16px;

box-shadow:
0 10px 25px rgba(0,0,0,.08);
}

.brand{
font-size:13px;
font-weight:700;
color:#ff6b00;
margin-bottom:8px;
letter-spacing:.5px;
}

.hero h1{
font-size:26px;
margin-bottom:8px;
color:#222;
}

.hero p{
font-size:14px;
color:#666;
line-height:1.7;
}

.product-count{

display:inline-block;

margin-top:12px;

padding:7px 14px;

background:#fff3eb;

color:#ff6b00;

font-size:12px;
font-weight:700;

border-radius:999px;
}

/* SEARCH */

.search-box{

width:100%;

padding:15px 18px;

border:none;

border-radius:14px;

margin-bottom:16px;

font-size:14px;

outline:none;

background:white;

box-shadow:
0 4px 12px rgba(0,0,0,.06);
}

/* PRODUCT CARD */

.product{

display:flex;
align-items:center;

gap:14px;

background:white;

padding:14px 16px;

margin-bottom:10px;

border-radius:16px;

text-decoration:none;

color:#222;

transition:.25s;

box-shadow:
0 4px 12px rgba(0,0,0,.06);
}

.product:hover{

transform:translateY(-2px);

box-shadow:
0 10px 20px rgba(0,0,0,.12);
}

.no{

width:42px;
height:42px;

display:flex;
align-items:center;
justify-content:center;

background:
linear-gradient(
135deg,
#ff6b00,
#ff9a1f
);

color:white;

font-size:14px;
font-weight:700;

border-radius:12px;
}

.name{
flex:1;
font-size:14px;
font-weight:600;
}

.arrow{
font-size:20px;
font-weight:bold;
color:#ff6b00;
}

.highlight{
border:3px solid #ff6b00 !important;

box-shadow:
0 0 0 4px rgba(255,107,0,.15),
0 12px 30px rgba(255,107,0,.18);

transform:scale(1.02);
}

.footer{
text-align:center;
margin-top:25px;
font-size:12px;
color:#777;
}

</style>
</head>

<body>

<div class="top-blob"></div>
<div class="bottom-blob"></div>

<div class="big-circle"></div>
<div class="small-circle"></div>

<div class="dots dots-top"></div>
<div class="dots dots-bottom"></div>

<div class="container">

<a href="index.html" class="back" id="backButton">
← Kembali
</a>

<div class="hero">

<div class="brand">
🔍 Temuan Pilihan
</div>

<h1 id="pageTitle">📦 Produk</h1>

<p>
Cari berdasarkan nomor produk atau nama produk yang kamu lihat di konten kami.
</p>

<div class="product-count" id="productCount">
0 Produk
</div>

</div>

<input
type="text"
id="searchInput"
placeholder="🔍 Cari nomor atau nama produk..."
class="search-box">

<div id="productList"></div>

<div class="footer">
© Temuan Pilihan
</div>

</div>

<script src="products.js"></script>

<script>

const params =
new URLSearchParams(window.location.search);

const range =
params.get("range") || "1-100";

const targetProduct =
params.get("produk");

const [start,end] =
range.split("-").map(Number);

const pageTitle =
document.getElementById("pageTitle");

const productCount =
document.getElementById("productCount");

const productList =
document.getElementById("productList");

const searchInput =
document.getElementById("searchInput");

pageTitle.textContent =
`📦 Produk ${start} - ${end}`;

const rangeProducts =
PRODUCTS.filter(product=>{

const number =
parseInt(product.number);

return number >= start && number <= end;

});

productCount.textContent =
`${rangeProducts.length} Produk Tersedia`;

function renderProducts(products){

productList.innerHTML="";

products.forEach(product=>{

const card =
document.createElement("a");

card.href =
product.link;

card.target =
"_blank";

card.className =
"product product-item";

card.id =
`produk-${product.number}`;

card.innerHTML = `
<div class="no">${product.number}</div>
<div class="name">${product.name}</div>
<div class="arrow">›</div>
`;

productList.appendChild(card);

});

highlightTarget();

}

function highlightTarget(){

if(!targetProduct) return;

const target =
document.getElementById(
`produk-${targetProduct}`
);

if(!target) return;

setTimeout(()=>{

target.classList.add("highlight");

target.scrollIntoView({
behavior:"smooth",
block:"center"
});

},300);

}

renderProducts(rangeProducts);

searchInput.addEventListener("input",()=>{

const keyword =
searchInput.value
.trim()
.toLowerCase();

if(!keyword){

renderProducts(rangeProducts);
return;

}

const filtered =
rangeProducts.filter(product=>

product.number
.toLowerCase()
.includes(keyword)

||

product.name
.toLowerCase()
.includes(keyword)

);

renderProducts(filtered);

});

document
.getElementById("backButton")
.addEventListener("click",(e)=>{

e.preventDefault();

document.body.style.opacity="0";

setTimeout(()=>{

window.location.href =
"index.html";

},120);

});

</script>

</body>
</html>
